services:
  clickhouse:
    image: clickhouse:local
    # image: clickhouse/clickhouse-server:latest
    container_name: clickhouse_search
    restart: unless-stopped
    environment:
      - CLICKHOUSE_USER=${CH_USER}
      - CLICKHOUSE_PASSWORD=${CH_PASSWORD}
      - CLICKHOUSE_DB=${CH_DB}
    ulimits:
      nofile:
        soft: ${SOFT}
        hard: ${HARD}
    # Ограничиваем ресурсы, чтобы CH не "съел" весь сервер при индексации
    deploy:
      resources:
        limits:
          cpus: '${LIMITS_CPU}'
          memory: ${LIMITS_MEMORY}
        reservations:
          cpus: '${RESERVE_CPUS}'
          memory: ${RESERVE_MEMORY}
    expose:
      - "${EXPOSE_HTTP}" # HTTP (для асинхронных запросов из FastAPI)
      - "${EXPOSE_NATIVE}" # Native (для системных нужд)
    volumes:
      - ${BIND_VOLUMES}/clickhouse/ch_data:/var/lib/clickhouse
      - ${BIND_VOLUMES}/clickhouse/ch_init:/docker-entrypoint-initdb.d
      - ${BIND_VOLUMES}/clickhouse/ch_config/experimental.xml:/etc/clickhouse-server/users.d/experimental.xml
      # - ./ch_init:/docker-entrypoint-initdb.d
      # - ./ch_config/experimental.xml:/etc/clickhouse-server/users.d/experimental.xml
    networks:
      clickhouse_network:
        # ipv4_address: ${IP_CLICK}
      clickhousepg_network:
        # ipv4_address: ${IP_CLICKPG}
  
  seaweedfs_master:
    image: chrislusf/seaweedfs:4.22
    container_name: seaweedfs_master
    restart: unless-stopped
    command:
      - "master"
      - "-ip=seaweedfs_master"
      - "-port=9333"
      - "-defaultReplication=001"
      - "-volumeSizeLimitMB=1024"
      - "-garbageThreshold=0.3"
      # Убираем -peers (не нужен для одного master)
      # Убираем -index, -compactionMBps, -maxParallelVacuumPerServer (это для volume)
    environment:
      - WEED_MAX_MEMORY=4294967296
    volumes:
      - ${BIND_VOLUMES}/seaweedfs/master:/data
    ulimits:
      nofile:
        soft: ${SOFT}
        hard: ${HARD}
    # Для docker-compose (без swarm)
    cpus: 1.0
    mem_limit: 6G
    mem_reservation: 2G
    networks:
      clickhouse_network: { }
      clickhousepg_network: { }
      nginx_gateway_shared_network: { }
    healthcheck:
      # Вариант 1: Проверка через /cluster/status (рекомендуемый)
      test: [ "CMD", "curl", "-f", "http://localhost:9333/cluster/status" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    
  
  seaweedfs_volume:
    image: chrislusf/seaweedfs:4.22  # стабильная версия
    container_name: seaweedfs_volume
    restart: unless-stopped
    command:
      - "volume"
      - "-mserver=seaweedfs_master:9333"
      - "-ip=seaweedfs_volume"
      - "-port=8080"
      - "-publicUrl=${SEAWEEDFS_PUBLIC_URL:-http://localhost}"
      - "-dataCenter=dc1"
      - "-rack=rack1"
      - "-max=500"
      - "-dir=/data"
      - "-maxCpu=6"  # жесткое значение, не переменная
      # - "-idxFolder=/data/index"
    environment:
      - WEED_MAX_MEMORY=12884901888
      - GODEBUG=madvdontneed=1
      - TMPDIR=/tmp/seaweedfs
    volumes:
      - ${BIND_VOLUMES}/seaweedfs/volumes:/data
      - ${BIND_VOLUMES}/seaweedfs/tmp:/tmp/seaweedfs
      - type: tmpfs
        target: /tmp/seaweedfs_cache
        tmpfs:
          size: 1073741824
    ulimits:
      nofile:
        soft: ${SOFT}
        hard: ${HARD}
    # Для docker-compose up (без swarm)
    cpus: 12.0
    mem_limit: 20G
    mem_reservation: 8G
    networks:
      clickhouse_network: { }
      clickhousepg_network: { }
      nginx_gateway_shared_network: { }
    depends_on:
      seaweedfs_master:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/status" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 45s

networks:
  vllm_network:
    name: vllm_network
    driver: bridge
    external: true
  clickhouse_network:
    name: clickhouse_network
    driver: bridge
    external: true
  clickhousepg_network:
    name: clickhousepg_network
    driver: bridge
    external: true
  nginx_gateway_shared_network:
    driver: bridge
    external: true
