services:
  clickhouse:
    image: clickhouse:local
    # image: clickhouse/clickhouse-server:latest
    container_name: clickhouse_search
    restart: unless-stopped
    environment:
      - CLICKHOUSE_USER=${CH_USER}
      - CLICKHOUSE_PASSWORD=${CH_PASSWORD}
      - CLICKHOUSE_DB=${CH_DB}
    ulimits:
      nofile:
        soft: ${SOFT}
        hard: ${HARD}
    # Ограничиваем ресурсы, чтобы CH не "съел" весь сервер при индексации
    deploy:
      resources:
        limits:
          cpus: '${LIMITS_CPU}'
          memory: ${LIMITS_MEMORY}
        reservations:
          cpus: '${RESERVE_CPUS}'
          memory: ${RESERVE_MEMORY}
    expose:
      - "${EXPOSE_HTTP}" # HTTP (для асинхронных запросов из FastAPI)
      - "${EXPOSE_NATIVE}" # Native (для системных нужд)
    volumes:
      - ${BIND_VOLUMES}/clickhouse/ch_data:/var/lib/clickhouse
      - ${BIND_VOLUMES}/clickhouse/ch_init:/docker-entrypoint-initdb.d
      - ${BIND_VOLUMES}/clickhouse/ch_config/experimental.xml:/etc/clickhouse-server/users.d/experimental.xml
      # - ./ch_init:/docker-entrypoint-initdb.d
      # - ./ch_config/experimental.xml:/etc/clickhouse-server/users.d/experimental.xml
    networks:
      clickhouse_network:
        # ipv4_address: ${IP_CLICK}
      clickhousepg_network:
        # ipv4_address: ${IP_CLICKPG}
  
  seaweedfs_master:
    image: chrislusf/seaweedfs:4.22
    container_name: seaweedfs_master
    restart: unless-stopped
    command: |
      master
      -ip=seaweedfs_master
      -port=9333
      -peers=seaweedfs_master:9333
      -defaultReplication=001
      -volumeSizeLimitMB=1024
      -heartbeatIntervalSeconds=1
      -electionTimeoutMs=1000
      -garbageThreshold=0.3
      -index=leveldb
      -compactionMBps=10
      -maxParallelVacuumPerServer=1
    environment:
      - WEED_MAX_MEMORY=4294967296  # 4GB для master (минимально)
    volumes:
      - ${BIND_VOLUMES}/seaweedfs/master:/data
    ulimits:
      nofile:
        soft: ${SOFT}
        hard: ${HARD}
    deploy:
      resources:
        limits:
          cpus: '1.0'  # Master не требует много CPU
          memory: 6G   # 4GB + 2GB резерв
        reservations:
          cpus: '0.5'
          memory: 2G
    networks:
      clickhouse_network: { }
      clickhousepg_network: { }
      nginx_gateway_shared_network: { }
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9333/status" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    
    seaweedfs_volume:
      image: chrislusf/seaweedfs:latest
      container_name: seaweedfs_volume
      restart: unless-stopped
      command: |
        volume
        -mserver=seaweedfs_master:9333
        -ip=seaweedfs_volume
        -port=8080
        -publicUrl=${SEAWEEDFS_PUBLIC_URL:-http://localhost}
        -dataCenter=dc1
        -rack=rack1
        -max=500  # максимум 500 томов (500 * 30GB = 15TB)
        -dir=/data
        -idxFolder=/data/index
        -maxCpu=${VOLUME_MAX_CPU:-6}
      environment:
        - WEED_MAX_MEMORY=12884901888  # 12GB + резерв (20% от 64GB)
        - GODEBUG=madvdontneed=1       # Оптимизация памяти для Go
        - TMPDIR=/tmp/seaweedfs
      volumes:
        - ${BIND_VOLUMES}/seaweedfs/volumes:/data
        - ${BIND_VOLUMES}/seaweedfs/tmp:/tmp/seaweedfs
        - type: tmpfs
          target: /tmp/seaweedfs_cache
          tmpfs:
            size: 1073741824  # 1GB tmpfs для кэша (очень быстро)
      ulimits:
        nofile:
          soft: ${SOFT}
          hard: ${HARD}
      deploy:
        resources:
          limits:
            cpus: '${VOLUME_MAX_CPU}'      # Используем 12 ядер из 28 (Xeon E5-2680 v4 имеет 14c/28t)
            memory: 20G       # 20% от 64GB ≈ 12.8GB, берем с запасом
          reservations:
            cpus: '4.0'       # Минимум 4 ядра
            memory: 8G        # Минимум 8GB
      networks:
        clickhouse_network: { }
        clickhousepg_network: { }
        nginx_gateway_shared_network: { }
      depends_on:
        seaweedfs_master:
          condition: service_healthy
      healthcheck:
        test: [ "CMD", "curl", "-f", "http://localhost:8080/status" ]
        interval: 15s
        timeout: 5s
        retries: 3
        start_period: 45s

networks:
  vllm_network:
    name: vllm_network
    driver: bridge
    external: true
  clickhouse_network:
    name: clickhouse_network
    driver: bridge
    external: true
  clickhousepg_network:
    name: clickhousepg_network
    driver: bridge
    external: true
  nginx_gateway_shared_network:
    driver: bridge
    external: true
